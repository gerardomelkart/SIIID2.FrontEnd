<div class="row g-4">
  <div class="col-xl-8">
    <div class="siiid-card">
      <div class="siiid-card-header">
        <i class="fa-solid fa-upload"></i>
        Carga de información, incidencia delictiva
      </div>

      <div class="p-4 carga-form">
        <div class="mb-2">
          <span class="required">*</span>
          <em> Seleccionar Archivo Expedientes:</em>
          <div class="mt-1 file-row">
            <input type="file" class="form-control form-control-sm file-input">
          </div>
        </div>

        <div class="mb-2">
          <span class="required">*</span>
          <em> Seleccionar Archivo Delitos:</em>
          <div class="mt-1 file-row">
            <input type="file" class="form-control form-control-sm file-input">
          </div>
        </div>

        <div class="mb-4">
          <span class="required">*</span>
          <em> Seleccionar Archivo Víctimas:</em>
          <div class="mt-1 file-row">
            <input type="file" class="form-control form-control-sm file-input">
          </div>
        </div>

        <button class="btn btn-siiid btn-sm">
          Cargar Archivos
        </button>
      </div>
    </div>
  </div>

  <div class="col-xl-4">
    <div class="siiid-card">
      <div class="siiid-card-header">
        <i class="fa-solid fa-file-excel"></i>
        Descargar Plantillas
      </div>

      <div class="p-4">
        <div class="row text-center">
          <div class="col-4">
            <img src="/img/logo_XLSX.png" alt="Plantilla Excel" class="excel-icon">
            <div>Carpetas</div>
          </div>

          <div class="col-4">
            <img src="/img/logo_XLSX.png" alt="Plantilla Excel" class="excel-icon">
            <div>Delitos</div>
          </div>

          <div class="col-4">
            <img src="/img/logo_XLSX.png" alt="Plantilla Excel" class="excel-icon">
            <div>Víctimas</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
