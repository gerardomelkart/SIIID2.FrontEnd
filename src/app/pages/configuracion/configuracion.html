<div class="siiid-card configuracion-card">
  <div class="siiid-card-header">
    <i class="fa-solid fa-gears"></i>
    Configuración
  </div>

  <div class="configuracion-body">
    <p class="configuracion-instruccion">
      Seleccione la(s) opción(es) según se requiera.
    </p>

    <hr>

    <form class="configuracion-form">
      <label class="config-check">
        <input type="checkbox" checked>
        <span>Habilitar módulo para la carga de información</span>
      </label>

      <label class="config-check">
        <input type="checkbox" checked>
        <span>Habilitar módulo para actualizaciones de información</span>
      </label>

      <button type="button" class="btn btn-siiid btn-sm mt-3">
        Guardar
      </button>
    </form>
  </div>
</div>
