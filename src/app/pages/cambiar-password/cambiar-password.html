<div class="login-page" style="background-image: url('img/ImgFondo2.png')">
  <div class="login-logo">
    <img
      src="img/LogoSEGURIDAD.png"
      alt="Gobierno de México - Seguridad - Secretariado Ejecutivo"
    >
  </div>

  <div class="login-card">
    <div class="login-title">
      Cambio de Contraseña
    </div>

    <div class="login-body">
      <p class="password-help">
        Por seguridad, debe establecer una contraseña nueva antes de continuar.
      </p>

      <form (ngSubmit)="cambiarPassword()">
        <div class="field-group">
          <label>Nueva contraseña</label>

          <input
            type="password"
            name="nuevaPassword"
            autocomplete="new-password"
            [ngModel]="nuevaPassword()"
            (ngModelChange)="nuevaPassword.set($event)"
          >
        </div>

        <div class="field-group">
          <label>Confirmar nueva contraseña</label>

          <input
            type="password"
            name="confirmarPassword"
            autocomplete="new-password"
            [ngModel]="confirmarPassword()"
            (ngModelChange)="confirmarPassword.set($event)"
          >
        </div>

        @if (mensajeError()) {
          <div class="login-error">
            {{ mensajeError() }}
          </div>
        }

        <button
          type="submit"
          class="btn-login"
          [disabled]="guardando()"
        >
          @if (guardando()) {
            Actualizando...
          } @else {
            Cambiar contraseña
          }
        </button>

        <button
          type="button"
          class="btn-salir"
          [disabled]="guardando()"
          (click)="cerrarSesion()"
        >
          Cerrar sesión
        </button>
      </form>
    </div>
  </div>
</div>
